services:
  - type: web
    name: cogent-event-ai-personalizer-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: FRONTEND_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false